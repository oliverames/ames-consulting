name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build static artifact
        run: |
          mkdir -p _site
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            ./ _site/
          cd _site
          node scripts/generate-blog-posts.mjs
          node scripts/generate-blog-index.mjs
          node scripts/generate-photography-galleries.mjs
          node scripts/generate-eastrise-pages.mjs
          node scripts/generate-seo-artifacts.mjs --out-dir .

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
